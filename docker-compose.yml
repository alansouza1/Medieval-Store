services:
  # Backend Service
  node:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: trybesmith
    tty: true
    stdin_open: true
    # Run dev command by default
    command: npm run dev
    restart: always
    working_dir: /app
    volumes:
      # Mount source for hot-reloading (only in dev)
      - ./backend:/app
      # Exclude node_modules from volume sync to keep it container-specific
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_HOST: ${MYSQL_HOST}
      JWT_SECRET: ${JWT_SECRET}

  # MySQL Database Service
  db:
    container_name: trybesmith_db
    image: mysql:8.0.21
    restart: always
    ports:
      - "3306:3306"
      - "33060:33060"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 5

# Named volumes for data persistence
volumes:
  mysql_data:

# Network configuration
networks:
  default:
    name: trybesmith_net
